<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>ReadBud · WeChat 自动填充</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <header class="popup__header">
      <h1>ReadBud</h1>
      <span class="popup__sub">WeChat 自动填充</span>
    </header>

    <section class="popup__section">
      <label class="popup__label" for="apiBase">ReadBud API 地址</label>
      <input id="apiBase" type="url" placeholder="http://localhost:19881/api/v1">
      <p class="popup__hint">本地开发默认: <code>http://localhost:19881/api/v1</code> (必须带 /api/v1)</p>
    </section>

    <section class="popup__section">
      <label class="popup__label" for="token">插件令牌</label>
      <input id="token" type="password" placeholder="rbex_…">
      <p class="popup__hint">在 ReadBud 设置 → 浏览器插件 里签发</p>
    </section>

    <div class="popup__actions">
      <button id="save" class="popup__btn popup__btn--primary">保存配置</button>
      <button id="test" class="popup__btn popup__btn--ghost">测试连接</button>
    </div>

    <div id="status" class="popup__status" hidden></div>

    <footer class="popup__footer">
      v0.1.0 · 在 mp.weixin.qq.com/cgi-bin/appmsg 自动激活
    </footer>
  </main>

  <script src="popup.js" type="module"></script>
</body>
</html>
