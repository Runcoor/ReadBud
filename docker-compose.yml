services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: readbud
      POSTGRES_USER: readbud
      POSTGRES_PASSWORD: readbud_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readbud"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/api"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/configs/config.docker.yaml:/app/configs/config.yaml
      - ./data/images:/app/data/images
    ports:
      - "19881:19881"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/worker"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/configs/config.docker.yaml:/app/configs/config.yaml
      - ./data/images:/app/data/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "19880:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
